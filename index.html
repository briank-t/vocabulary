<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Learning Server</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --button-hover: #2980b9;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .server-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 90%;
        }

        .vocab-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            color: white;
            background-color: var(--accent-color);
            border-radius: 8px;
            transition: all 0.2s ease;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .vocab-button:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .vocab-button:active {
            transform: translateY(0);
        }

        /* Logic for full-width button if odd number */
        .vocab-button:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <h1>Vocabulary Activity Server</h1>

    <div class="server-container">
        <a href="vocab_animal.html" class="vocab-button">🐾 Animal Vocab</a>
        <a href="vocab_cards.html" class="vocab-button">🗂️ Flash Cards</a>
        <a href="vocab_magicE.html" class="vocab-button">🪄 Magic E</a>
        <a href="vocab_maze.html" class="vocab-button">🌀 Vocab Maze</a>
        <a href="vocab_lr.html" class="vocab-button">🎧 L/R Practice (Vol. 1)</a>
        <a href="vocab_lr2.html" class="vocab-button">🎧 L/R Practice (Vol. 2)</a>
	<a href="vocab_7.html" class="vocab-button">🎧 混合音 Practice (Vol. 1)</a>
	<a href="vocab_7_2.html" class="vocab-button">🎧 混合音 Practice (Vol. 2)</a>
	<a href="vocab_8.html" class="vocab-button">🎧 Lesson 8 (Vol. 1)</a>
	<a href="vocab_8_2.html" class="vocab-button">🎧 Lesson 8 (Vol. 2)</a>



    </div>

    <div class="footer">
        Status: Online | Embedded System Interface v1.0
    </div>

</body>
</html>
