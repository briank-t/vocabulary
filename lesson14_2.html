<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字學習卡 - v1</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F9FA;
    --ink: #2D3436;
    --yellow: #F39C12;
    --blue: #3498DB;
    --green: #27AE60;
    --red: #E74C3C;
    --muted: #636E72;
    --soft: #DFE6E9;
    --white: #FFFFFF;
    --card-w: min(400px, 90vw);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    padding: 20px;
  }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 1.5rem; font-weight: 800; }
  
  .mode-switch { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
  .tab-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid var(--soft); background: var(--white); cursor: pointer; font-weight: 700; transition: 0.2s; }
  .tab-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

  .tts-toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .tts-label { font-size: 0.85rem; font-weight: 700; color: var(--muted); }
  .toggle-group { display: flex; border: 2px solid var(--soft); border-radius: 20px; overflow: hidden; }
  .toggle-opt { padding: 6px 14px; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: var(--white); border: none; transition: 0.2s; color: var(--muted); }
  .toggle-opt.active { background: var(--blue); color: white; }

  #card-mode { width: var(--card-w); text-align: center; }
  
  .slide-container {
    background: var(--white); border: 3px solid var(--soft); border-radius: 30px; 
    padding: 40px 20px; position: relative; margin-bottom: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s;
    min-height: 380px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .slide-container.playing-strong, .slide-container.playing-diphthong { border-color: var(--yellow); background: #FFF4E6; }
  .slide-container.playing-weak { border-color: var(--blue); background: #EBF5FB; }

  .spell-badge {
    position: absolute; top: 20px; left: 20px;
    padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; color: white;
  }
  .badge-strong { background: var(--yellow); }
  .badge-diphthong { background: #E66A15; }
  .badge-weak { background: var(--blue); }

  .word-img { width: 200px; height: 200px; object-fit: contain; margin-bottom: 15px; border-radius: 15px; cursor: pointer; }
  .emoji-fallback { font-size: 5rem; display: block; margin-bottom: 15px; cursor: pointer; }

  .en { font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; color: #2d3436; margin-bottom: 5px; }
  .zh { font-size: 1.2rem; color: var(--muted); font-weight: 600; }

  .controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
  .nav-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; background: var(--ink); color: white; font-weight: 700; cursor: pointer; }
  .nav-btn:disabled { background: var(--soft); color: var(--muted); cursor: not-allowed; }
  .counter { font-weight: 800; color: var(--muted); font-size: 0.9rem; min-width: 60px; text-align: center; }

  #quiz-mode, #input-mode, #score-box { display: none; width: var(--card-w); text-align: center; }
  .quiz-card { background: var(--white); padding: 35px 25px; border-radius: 28px; box-shadow: 0 15px 30px rgba(0,0,0,0.08); position: relative; }
  .quiz-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--yellow); border: none; color: white; font-size: 2rem; cursor: pointer; margin-bottom: 20px; box-shadow: 0 5px 0 #d68910; }
  
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  .opt { padding: 15px; border-radius: 12px; border: 2px solid var(--soft); background: white; cursor: pointer; font-weight: 700; transition: 0.2s; }
  
  /* 填空測驗專用樣式 */
  .input-container { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
  .word-input { padding: 15px; border-radius: 12px; border: 2px solid var(--soft); font-size: 1.2rem; font-weight: 700; text-align: center; outline: none; font-family: 'Nunito', sans-serif; }
  .word-input:focus { border-color: var(--blue); }
  .submit-btn { padding: 12px; border-radius: 12px; border: none; background: var(--blue); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
  .submit-btn:hover { background: #2980b9; }

  .feedback-msg { height: 24px; margin-top: 15px; font-weight: 800; font-size: 1.1rem; }
  .msg-correct { color: var(--green); }
  .msg-wrong { color: var(--red); }
  
  .opt.correct { background: var(--green) !important; color: white !important; border-color: var(--green) !important; }
  .opt.wrong { background: var(--red) !important; color: white !important; border-color: var(--red) !important; }

  .spinner { display: none; position: absolute; top: 20px; right: 20px; width: 18px; height: 18px; border: 3px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
  .loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tts-indicator {
    position: absolute; top: 20px; right: 20px;
    font-size: 0.72rem; font-weight: 700; color: var(--muted);
    background: var(--soft); padding: 3px 9px; border-radius: 10px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🔤 英文發音練習 Lesson 14</h1>
  <p style="color:var(--muted)">Lesson: R-controlled Vowels (R控制母音)</p>
</div>

<div class="mode-switch">
  <button class="tab-btn active" id="tab-card" onclick="switchMode('card')">學習卡</button>
  <button class="tab-btn" id="tab-quiz" onclick="switchMode('quiz')">聽力測驗</button>
  <button class="tab-btn" id="tab-input" onclick="switchMode('input')">填空測驗</button>
</div>

<div class="tts-toggle-row">
  <span class="tts-label">🔊 發音來源：</span>
  <div class="toggle-group">
    <button class="toggle-opt active" id="tts-api" onclick="setTTS('api')">字典 API</button>
    <button class="toggle-opt" id="tts-browser" onclick="setTTS('browser')">瀏覽器 TTS</button>
  </div>
</div>

<div id="card-mode">
  <div class="slide-container" id="slide-box" onclick="playCurrentSlide()">
    <div class="spinner"></div>
    <div id="spell-badge" class="spell-badge"></div>
    <span class="tts-indicator" id="tts-mode-badge">API</span>
    <div id="media-area"></div>
    <div id="slide-en" class="en"></div>
    <div id="slide-zh" class="zh"></div>
    <p style="font-size: 0.8rem; color: var(--muted); margin-top: 15px;">💡 點選卡片可重複播放聲音</p>
  </div>

  <div class="controls">
    <button class="nav-btn" id="prev-btn" onclick="changeSlide(-1)">上一頁</button>
    <div class="counter" id="counter">1 / 10</div>
    <button class="nav-btn" id="next-btn" onclick="changeSlide(1)">下一頁</button>
  </div>
</div>

<div id="quiz-mode">
  <div class="quiz-card">
    <button class="quiz-btn" onclick="playQuizSound()">🔊</button>
    <p style="font-weight:700; color:var(--muted)">聽聽看，這是哪個單字？</p>
    <div class="options" id="quiz-options"></div>
    <div id="feedback" class="feedback-msg"></div>
  </div>
</div>

<!-- 填空測驗介面 -->
<div id="input-mode">
  <div class="quiz-card">
    <button class="quiz-btn" onclick="playQuizSound()">🔊</button>
    <p style="font-weight:700; color:var(--muted)">聽語音，請輸入正確的單字拼寫：</p>
    <div class="input-container">
      <input type="text" id="user-word-input" class="word-input" placeholder="在此輸入單字..." autocomplete="off" onkeydown="if(event.key==='Enter') checkInputAnswer()">
      <button class="submit-btn" onclick="checkInputAnswer()">提交答案</button>
    </div>
    <div id="input-feedback" class="feedback-msg"></div>
  </div>
</div>

<div id="score-box">
  <div class="quiz-card">
    <h2>測驗結束！</h2>
    <h1 id="score-num" style="font-size:3.5rem; color:var(--yellow); margin: 15px 0;">0</h1>
    <p>一次就答對的總分</p>
    <button class="tab-btn" style="margin-top:20px" onclick="location.reload()">重新挑戰</button>
  </div>
</div>

<script>
// ─── 單字資料 ───────────────────────────────────────────────
const wordData = [
  { en: 'stir',       zh: '攪拌', emoji: '🥄', img: './images/stir.jpg',       spell: '/ɜːr/ 重音',   type: 'strong' },
  { en: 'fur',        zh: '毛皮', emoji: '🧥', img: './images/fur.jpg',        spell: '/ɜːr/ 重音',   type: 'strong' },
  { en: 'perm',       zh: '燙髮', emoji: '🦱', img: './images/perm.jpg',       spell: '/ɜːr/ 重音',   type: 'strong' },
  { en: 'work',       zh: '工作', emoji: '💼', img: './images/work.jpg',       spell: '/ɜːr/ 重音',   type: 'strong' },
  { en: 'driver',     zh: '司機', emoji: '👨‍✈️', img: './images/driver.jpg',     spell: '/ər/ 輕音',    type: 'weak' },
  { en: 'translator', zh: '翻譯官', emoji: '🗣️', img: './images/translator.jpg', spell: '/ər/ 輕音',    type: 'weak' },
  { en: 'near',       zh: '靠近', emoji: '📍', img: './images/near.jpg',       spell: '雙母音結合',   type: 'diphthong' },
  { en: 'ear',        zh: '耳朵', emoji: '👂', img: './images/ear.jpg',        spell: '雙母音結合',   type: 'diphthong' },
  { en: 'hair',       zh: '頭髮', emoji: '💇', img: './images/hair.jpg',       spell: '雙母音結合',   type: 'diphthong' },
  { en: 'air',        zh: '空氣', emoji: '💨', img: './images/air.jpg',        spell: '雙母音結合',   type: 'diphthong' }
];

// ─── 狀態 ────────────────────────────────────────────────────
let currentIdx = 0;
let currentAudio = null;
let quizIdx = 0;
let score = 0;
let isFirstTry = true;
let quizList = [];
let ttsMode = 'api'; 
let currentTestMode = 'card'; // 'card' | 'quiz' | 'input'

// ─── TTS 切換 ────────────────────────────────────────────────
function setTTS(mode) {
  ttsMode = mode;
  document.getElementById('tts-api').classList.toggle('active', mode === 'api');
  document.getElementById('tts-browser').classList.toggle('active', mode === 'browser');
  document.getElementById('tts-mode-badge').innerText = mode === 'api' ? 'API' : '瀏覽器';
}

// ─── Web Audio 音效 ──────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, duration, volumn) {
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  oscillator.type = type;
  oscillator.frequency.value = freq;
  gainNode.gain.setValueAtTime(volumn, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + duration);
}

const playCorrectSfx = () => {
  playTone(440, 'sine', 0.2, 0.2);
  setTimeout(() => playTone(660, 'sine', 0.3, 0.2), 150);
};

const playWrongSfx = () => {
  playTone(110, 'triangle', 0.5, 0.5);
};

// ─── 初始化 ──────────────────────────────────────────────────
updateSlide();

function updateSlide() {
  const w = wordData[currentIdx];
  const mediaArea = document.getElementById('media-area');
  mediaArea.innerHTML = `<img src="${w.img}" class="word-img" onerror="this.style.display='none'; document.getElementById('fallback-emoji').style.display='block'">
                         <span id="fallback-emoji" class="emoji-fallback" style="display:none">${w.emoji}</span>`;
  document.getElementById('slide-en').innerText = w.en;
  document.getElementById('slide-zh').innerText = w.zh;
  document.getElementById('counter').innerText = `${currentIdx + 1} / ${wordData.length}`;
  const badge = document.getElementById('spell-badge');
  badge.innerText = `規則: ${w.spell}`;
  badge.className = `spell-badge badge-${w.type}`;
  document.getElementById('prev-btn').disabled = currentIdx === 0;
  document.getElementById('next-btn').disabled = currentIdx === wordData.length - 1;
  if(currentTestMode === 'card') playCurrentSlide();
}

function changeSlide(step) {
  currentIdx += step;
  updateSlide();
}

function playCurrentSlide() {
  const w = wordData[currentIdx];
  speak(w.en, 'slide-box', w.type);
}

// ─── 發音核心 ─────────────────────────────────────────────────
function speak(word, boxId, type) {
  if (currentAudio) currentAudio.pause();
  const box = boxId ? document.getElementById(boxId) : null;
  const playClass = `playing-${type}`;
  if (box) box.classList.add('loading', playClass);

  if (ttsMode === 'browser') {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    utter.onend = () => { if (box) box.classList.remove('loading', playClass); };
    window.speechSynthesis.speak(utter);
    return;
  }

  fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
    .then(r => r.json())
    .then(data => {
      let audioUrl = '';
      if (Array.isArray(data)) {
        for (let entry of data) {
          for (let ph of (entry.phonetics || [])) {
            if (ph.audio) { audioUrl = ph.audio; break; }
          }
          if (audioUrl) break;
        }
      }
      if (audioUrl) {
        if (audioUrl.startsWith('//')) audioUrl = 'https:' + audioUrl;
        currentAudio = new Audio(audioUrl);
        currentAudio.play().catch(() => fallbackTTS(word, box, playClass));
        currentAudio.onended = () => { if (box) box.classList.remove('loading', playClass); };
      } else {
        fallbackTTS(word, box, playClass);
      }
    })
    .catch(() => fallbackTTS(word, box, playClass));
}

function fallbackTTS(word, box, playClass) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.9;
  utter.onend = () => { if (box) box.classList.remove('loading', playClass); };
  window.speechSynthesis.speak(utter);
}

// ─── 模式切換 ─────────────────────────────────────────────────
function switchMode(mode) {
  currentTestMode = mode;
  document.getElementById('tab-card').classList.toggle('active', mode === 'card');
  document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('tab-input').classList.toggle('active', mode === 'input');
  
  document.getElementById('card-mode').style.display = mode === 'card' ? 'block' : 'none';
  document.getElementById('quiz-mode').style.display = mode === 'quiz' ? 'block' : 'none';
  document.getElementById('input-mode').style.display = mode === 'input' ? 'block' : 'none';
  document.getElementById('score-box').style.display = 'none';
  
  if (mode === 'quiz' || mode === 'input') startQuiz();
}

// ─── 測驗邏輯 ─────────────────────────────────────────────────
function startQuiz() {
  quizIdx = 0; score = 0;
  quizList = [...wordData].sort(() => Math.random() - 0.5);
  showQuiz();
}

function showQuiz() {
  if (quizIdx >= quizList.length) {
    document.getElementById('quiz-mode').style.display = 'none';
    document.getElementById('input-mode').style.display = 'none';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('score-num').innerText = score;
    return;
  }
  isFirstTry = true;
  
  if (currentTestMode === 'quiz') {
    document.getElementById('feedback').innerText = '';
    const current = quizList[quizIdx];
    const options = [current.en];
    while (options.length < 4) {
      const r = wordData[Math.floor(Math.random() * wordData.length)].en;
      if (!options.includes(r)) options.push(r);
    }
    options.sort(() => Math.random() - 0.5);
    document.getElementById('quiz-options').innerHTML = options.map(o =>
      `<div class="opt" onclick="checkAnswer(this, '${o}')">${o}</div>`
    ).join('');
  } else if (currentTestMode === 'input') {
    document.getElementById('input-feedback').innerText = '';
    const inputField = document.getElementById('user-word-input');
    inputField.value = '';
    inputField.disabled = false;
    inputField.focus();
  }
  
  setTimeout(playQuizSound, 500);
}

function playQuizSound() {
  const current = quizList[quizIdx];
  speak(current.en, null, current.type);
}

// ─── 聽力選擇答案檢查 ─────────────────────────────────────────────
function checkAnswer(el, ans) {
  const correctAns = quizList[quizIdx].en;
  const feedback = document.getElementById('feedback');

  if (ans === correctAns) {
    if (isFirstTry) score++;
    el.classList.add('correct');
    playCorrectSfx();
    feedback.innerHTML = '<span class="msg-correct">太棒了！正確答案 ✨</span>';
    setTimeout(() => { quizIdx++; showQuiz(); }, 1200);
  } else {
    isFirstTry = false;
    el.classList.add('wrong');
    playWrongSfx();
    feedback.innerHTML = '<span class="msg-wrong">不對喔，再試一次！💪</span>';
    setTimeout(() => { el.classList.remove('wrong'); feedback.innerText = ''; }, 1200);
  }
}

// ─── 填空輸入答案檢查 ─────────────────────────────────────────────
function checkInputAnswer() {
  const inputField = document.getElementById('user-word-input');
  const userAns = inputField.value.trim().toLowerCase();
  const correctAns = quizList[quizIdx].en.toLowerCase();
  const feedback = document.getElementById('input-feedback');

  if (userAns === correctAns) {
    if (isFirstTry) score++;
    inputField.disabled = true;
    playCorrectSfx();
    feedback.innerHTML = `<span class="msg-correct">太棒了！正確答案是 ${quizList[quizIdx].en} ✨</span>`;
    setTimeout(() => { quizIdx++; showQuiz(); }, 1200);
  } else {
    isFirstTry = false;
    playWrongSfx();
    feedback.innerHTML = '<span class="msg-wrong">拼法不對喔，再聽一次試試看！💪</span>';
    inputField.focus();
    inputField.select();
    setTimeout(() => { feedback.innerText = ''; }, 1200);
  }
}
</script>
</body>
</html>
