<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文發音練習 - Lesson 13</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background-color: #f8f9fa; }
    .app { padding: 1rem; max-width: 680px; margin: 0 auto; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
    .title-area { flex: 1; min-width: 200px; }
    .title { font-size: 22px; font-weight: 800; color: #2d3436; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #636e72; }
    
    .engine-toggle-btn { padding: 8px 16px; border-radius: 999px; border: 2px solid #b2bec3; background: white; color: #2d3436; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; display: flex; align-items: center; gap: 6px; }
    .engine-toggle-btn:hover { border-color: #2d3436; background: #f1f2f6; }
    .engine-toggle-btn.mode-browser { border-color: #3498DB; color: #2980B9; background: #EBF5FB; }
    
    .group-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab { padding: 6px 18px; border-radius: 999px; border: 1.5px solid; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
    
    /* 頁籤顏色 */
    .tab-oo { border-color: #5DCAA5; color: #0F6E56; background: #E1F5EE; }
    .tab-oo.active { background: #1D9E75; color: white; }
    .tab-ar { border-color: #FFB077; color: #A04000; background: #FFEFE3; }
    .tab-ar.active { background: #E66A15; color: white; }

    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .word-card { border-radius: 16px; padding: 16px 12px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); cursor: pointer; transition: transform 0.15s, border-color 0.15s, background-color 0.15s; position: relative; border: 2px solid; }
    .word-card:hover { transform: translateY(-2px); }

    /* oo 長音 /uː/ — 藍綠色系 */
    .card-spell-oo-long { background-color: #f0faf6; border-color: #caebd9; }
    .card-spell-oo-long:hover { border-color: #9fe1cb; }
    .card-spell-oo-long.playing { border-color: #1D9E75; background-color: #d1f2e5; }

    /* oo 短音 /ʊ/ — 藍紫色系 */
    .card-spell-oo-short { background-color: #f0f4ff; border-color: #c8d6fa; }
    .card-spell-oo-short:hover { border-color: #a0b8f8; }
    .card-spell-oo-short.playing { border-color: #4361EE; background-color: #d6e0ff; }

    /* ar /ɑːr/ — 橘色系 */
    .card-spell-ar { background-color: #fff7f0; border-color: #f7decb; }
    .card-spell-ar:hover { border-color: #fac775; }
    .card-spell-ar.playing { border-color: #E66A15; background-color: #ffebd9; }

    /* war/wor /wɔːr/ — 紫紅色系 */
    .card-spell-war { background-color: #fdf0f8; border-color: #f2cde8; }
    .card-spell-war:hover { border-color: #e9a8d6; }
    .card-spell-war.playing { border-color: #C2185B; background-color: #fad6ec; }

    /* 小標籤 */
    .badge { display: inline-block; font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 8px; margin-bottom: 8px; color: white; }
    .badge-oo-long { background-color: #1D9E75; }
    .badge-oo-short { background-color: #4361EE; }
    .badge-ar { background-color: #E66A15; }
    .badge-war { background-color: #C2185B; }

    /* 長短音說明標題 */
    .sound-section-label {
      grid-column: 1 / -1;
      font-size: 13px;
      font-weight: 800;
      padding: 6px 12px;
      border-radius: 10px;
      margin-top: 4px;
      margin-bottom: 2px;
    }
    .label-long { background: #d1f2e5; color: #0F6E56; }
    .label-short { background: #d6e0ff; color: #1e3a8a; }
    .label-ar { background: #ffebd9; color: #A04000; }
    .label-war { background: #fad6ec; color: #880E4F; }

    .word-emoji { font-size: 42px; margin: 8px 0; display: block; }
    .word-en { font-size: 24px; font-weight: 800; color: #2d3436; margin-bottom: 2px; }
    .word-zh { font-size: 14px; font-weight: 600; color: #7f8c8d; }
    .btn-audio { background: none; border: none; font-size: 18px; cursor: pointer; margin-top: 8px; outline: none; color: #7f8c8d; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="title-area">
      <h1 class="title">🔤 英文發音練習</h1>
      <p class="subtitle">Lesson 13: oo 的長短音 /uː/ & /ʊ/ vs. r 控制母音 /ɑːr/ & /wɔːr/</p>
    </div>
    <button id="engine-toggle" class="engine-toggle-btn" onclick="toggleEngine()">
      <span>🌐 發音模式: speak (字典 API)</span>
    </button>
  </div>

  <div class="group-tabs">
    <button class="tab tab-oo active" onclick="switchMode('oo')">oo 的兩種發音</button>
    <button class="tab tab-ar" onclick="switchMode('ar')">r 控制母音</button>
  </div>

  <div id="card-view" class="grid-container"></div>
</div>

<script>
const wordData = [
  // Group oo — 長音 /uː/
  { en: 'room',  zh: '房間', emoji: '🛋️', spell: 'oo-long', sound: '/uː/', type: 'oo' },
  { en: 'moon',  zh: '月亮', emoji: '🌙', spell: 'oo-long', sound: '/uː/', type: 'oo' },
  // Group oo — 短音 /ʊ/
  { en: 'foot',  zh: '腳',   emoji: '🦶', spell: 'oo-short', sound: '/ʊ/',  type: 'oo' },
  { en: 'brook', zh: '小溪', emoji: '🏞️', spell: 'oo-short', sound: '/ʊ/',  type: 'oo' },

  // Group ar — /ɑːr/
  { en: 'star',  zh: '星星', emoji: '⭐', spell: 'ar',  sound: '/ɑːr/', type: 'ar' },
  { en: 'farm',  zh: '農場', emoji: '🌾', spell: 'ar',  sound: '/ɑːr/', type: 'ar' },
  // Group war/wor — /wɔːr/
  { en: 'ward',  zh: '守衛', emoji: '💂', spell: 'war', sound: '/wɔːr/', type: 'ar' },
  { en: 'sword', zh: '劍',   emoji: '⚔️', spell: 'war', sound: '/wɔːr/', type: 'ar' },
];

let currentAudio = null;
let currentMode = 'oo';
let useBrowserTTS = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

renderCards();

function renderCards() {
  const area = document.getElementById('card-view');
  const filtered = wordData.filter(w => w.type === currentMode);

  // 把同 spell 的字分組，並在組前插入說明標籤
  let html = '';
  let lastSpell = null;

  filtered.forEach((w, idx) => {
    if (w.spell !== lastSpell) {
      lastSpell = w.spell;
      const labelMap = {
        'oo-long':  { cls: 'label-long', text: '🔵 長音 /uː/ — 嘴型拉長，像說「烏」' },
        'oo-short': { cls: 'label-short', text: '🟣 短音 /ʊ/ — 嘴型放鬆，短短的「ㄨ」' },
        'ar':       { cls: 'label-ar',   text: '🟠 ar → /ɑːr/ — 嘴巴張大，捲舌' },
        'war':      { cls: 'label-war',  text: '🌸 war/wor → /wɔːr/ — 嘴唇先圓，再捲舌' },
      };
      const lbl = labelMap[w.spell];
      html += `<div class="sound-section-label ${lbl.cls}">${lbl.text}</div>`;
    }
    const bgClass = `card-spell-${w.spell}`;
    const badgeLabel = w.spell === 'oo-long' ? 'oo /uː/' : w.spell === 'oo-short' ? 'oo /ʊ/' : w.spell === 'ar' ? '-ar' : 'war/wor';
    html += `
      <div class="word-card ${bgClass}" id="card-${idx}" onclick="speak('${w.en}', ${idx})">
        <span class="badge badge-${w.spell}">${badgeLabel}</span>
        <span class="word-emoji">${w.emoji}</span>
        <div class="word-en">${w.en}</div>
        <div class="word-zh">${w.zh}</div>
        <button class="btn-audio" id="btn-${idx}">🔊</button>
      </div>
    `;
  });

  area.innerHTML = html;
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-${mode}`).classList.add('active');
  renderCards();
}

function toggleEngine() {
  useBrowserTTS = !useBrowserTTS;
  const btn = document.getElementById('engine-toggle');
  if (useBrowserTTS) {
    btn.className = "engine-toggle-btn mode-browser";
    btn.innerHTML = "💻 發音模式: speak_browser (瀏覽器 API)";
  } else {
    btn.className = "engine-toggle-btn";
    btn.innerHTML = "🌐 發音模式: speak (字典 API)";
  }
}

function speak(word, id) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if ('speechSynthesis' in window && window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); }
  
  const card = document.getElementById('card-' + id);
  const btn = document.getElementById('btn-' + id);
  if (!card) return;

  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
  card.classList.add('playing');

  if (useBrowserTTS) {
    fallbackTTS(word, card);
    return;
  }

  if (btn) btn.innerHTML = '<span class="spinner"></span>';
  fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`)
    .then(r => r.json())
    .then(data => {
      let audioUrl = null;
      if (Array.isArray(data)) {
        for (const entry of data) {
          for (const ph of (entry.phonetics || [])) {
            if (ph.audio) { audioUrl = ph.audio; break; }
          }
          if (audioUrl) break;
        }
      }
      if (btn) btn.textContent = '🔊';
      if (audioUrl) {
        currentAudio = new Audio(audioUrl);
        currentAudio.play();
        currentAudio.onended = () => card.classList.remove('playing');
      } else {
        fallbackTTS(word, card);
      }
    })
    .catch(() => {
      if (btn) btn.textContent = '🔊';
      fallbackTTS(word, card);
    });
}

function fallbackTTS(word, card) {
  if ('speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = 0.9;
    utter.onend = () => { if (card) card.classList.remove('playing'); };
    window.speechSynthesis.speak(utter);
  } else if (card) {
    card.classList.remove('playing');
  }
}
</script>
</body>
</html>
