<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文發音練習 - Lesson 15</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background-color: #f8f9fa; }
    .app { padding: 1rem; max-width: 680px; margin: 0 auto; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
    .title-area { flex: 1; min-width: 200px; }
    .title { font-size: 22px; font-weight: 800; color: #2d3436; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #636e72; }

    .engine-toggle-btn { padding: 8px 16px; border-radius: 999px; border: 2px solid #b2bec3; background: white; color: #2d3436; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; display: flex; align-items: center; gap: 6px; }
    .engine-toggle-btn:hover { border-color: #2d3436; background: #f1f2f6; }
    .engine-toggle-btn.mode-browser { border-color: #3498DB; color: #2980B9; background: #EBF5FB; }

    .group-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab { padding: 6px 18px; border-radius: 999px; border: 1.5px solid; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; }

    .tab-y     { border-color: #5DCAA5; color: #0F6E56; background: #E1F5EE; }
    .tab-y.active { background: #1D9E75; color: white; }
    .tab-al    { border-color: #7F77DD; color: #3C3489; background: #EEEDFE; }
    .tab-al.active { background: #534AB7; color: white; }
    .tab-extra { border-color: #FFB077; color: #A04000; background: #FFEFE3; }
    .tab-extra.active { background: #E66A15; color: white; }

    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

    .word-card { border-radius: 16px; padding: 16px 12px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); cursor: pointer; transition: transform 0.15s, border-color 0.15s, background-color 0.15s; position: relative; border: 2px solid; }
    .word-card:hover { transform: translateY(-2px); }

    /* 字尾 Y /iː/ — 綠色 */
    .card-y-ee  { background-color: #f0faf6; border-color: #caebd9; }
    .card-y-ee:hover  { border-color: #9fe1cb; }
    .card-y-ee.playing  { border-color: #1D9E75; background-color: #d1f2e5; }

    /* 字尾 Y /aɪ/ — 藍色 */
    .card-y-ai  { background-color: #eef4fb; border-color: #c4daf5; }
    .card-y-ai:hover  { border-color: #85b7eb; }
    .card-y-ai.playing  { border-color: #185FA5; background-color: #d0e8f8; }

    /* -ALL / -AL / -ALK /ɔː/ — 紫色 */
    .card-al { background-color: #f3f2fe; border-color: #ceccf5; }
    .card-al:hover { border-color: #afa9ec; }
    .card-al.playing { border-color: #534AB7; background-color: #dddcf9; }

    /* 補充 work — 橘色 */
    .card-work { background-color: #fff7f0; border-color: #f7decb; }
    .card-work:hover { border-color: #fac775; }
    .card-work.playing { border-color: #E66A15; background-color: #ffebd9; }

    /* 補充 snail — 粉紅 */
    .card-snail { background-color: #fdf0f5; border-color: #f5c4d1; }
    .card-snail:hover { border-color: #ed93b1; }
    .card-snail.playing { border-color: #993556; background-color: #f7d9e5; }

    .badge { display: inline-block; font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 8px; margin-bottom: 8px; color: white; }
    .badge-y-ee   { background-color: #1D9E75; }
    .badge-y-ai   { background-color: #185FA5; }
    .badge-al     { background-color: #534AB7; }
    .badge-work   { background-color: #E66A15; }
    .badge-snail  { background-color: #993556; }

    .sound-section-label {
      grid-column: 1 / -1;
      font-size: 13px; font-weight: 800;
      padding: 6px 12px; border-radius: 10px;
      margin-top: 4px; margin-bottom: 2px;
    }
    .label-y-ee   { background: #d1f2e5; color: #0F6E56; }
    .label-y-ai   { background: #d0e8f8; color: #0C447C; }
    .label-al     { background: #dddcf9; color: #3C3489; }
    .label-work   { background: #ffebd9; color: #A04000; }
    .label-snail  { background: #f7d9e5; color: #72243E; }

    .word-emoji { font-size: 42px; margin: 8px 0; display: block; }
    .word-en { font-size: 24px; font-weight: 800; color: #2d3436; margin-bottom: 2px; }
    .word-zh { font-size: 14px; font-weight: 600; color: #7f8c8d; }
    .btn-audio { background: none; border: none; font-size: 18px; cursor: pointer; margin-top: 8px; outline: none; color: #7f8c8d; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="title-area">
      <h1 class="title">🔤 英文發音練習</h1>
      <p class="subtitle">Lesson 15：字尾 Y、-ALL/-ALK、補充單字</p>
    </div>
    <button id="engine-toggle" class="engine-toggle-btn" onclick="toggleEngine()">
      <span>🌐 發音模式: speak (字典 API)</span>
    </button>
  </div>

  <div class="group-tabs">
    <button class="tab tab-y active"    onclick="switchMode('y')">字尾 Y（/iː/ & /aɪ/）</button>
    <button class="tab tab-al"          onclick="switchMode('al')">-ALL / -ALK（/ɔːl/）</button>
    <button class="tab tab-extra"       onclick="switchMode('extra')">補充單字</button>
  </div>

  <div id="card-view" class="grid-container"></div>
</div>

<script>
const wordData = [
  // 頁籤 1：字尾 Y
  { en: 'funny', zh: '有趣的', emoji: '😄', spell: 'y-ee', sound: 'y → /iː/', type: 'y' },
  { en: 'baby',  zh: '嬰兒',   emoji: '👶', spell: 'y-ee', sound: 'y → /iː/', type: 'y' },
  { en: 'city',  zh: '城市',   emoji: '🏙️', spell: 'y-ee', sound: 'y → /iː/', type: 'y' },
  { en: 'sky',   zh: '天空',   emoji: '🌤️', spell: 'y-ai', sound: 'y → /aɪ/', type: 'y' },

  // 頁籤 2：-ALL / -ALK
  { en: 'fall',  zh: '跌落',   emoji: '🍂', spell: 'al', sound: '-all /ɔːl/', type: 'al' },
  { en: 'ball',  zh: '球',     emoji: '⚽', spell: 'al', sound: '-all /ɔːl/', type: 'al' },
  { en: 'wall',  zh: '牆壁',   emoji: '🧱', spell: 'al', sound: '-all /ɔːl/', type: 'al' },
  { en: 'small', zh: '小的',   emoji: '🔬', spell: 'al', sound: '-all /ɔːl/', type: 'al' },
  { en: 'talk',  zh: '說話',   emoji: '💬', spell: 'al', sound: '-alk /ɔːk/', type: 'al' },
  { en: 'chalk', zh: '粉筆',   emoji: '🖊️', spell: 'al', sound: '-alk /ɔːk/', type: 'al' },

  // 頁籤 3：補充
  { en: 'work',  zh: '工作',   emoji: '💼', spell: 'work',  sound: 'or→/ɜːr/', type: 'extra' },
  { en: 'snail', zh: '蝸牛',   emoji: '🐌', spell: 'snail', sound: 'ai→/eɪ/',  type: 'extra' },
];

let currentMode = 'y';
let currentAudio = null;
let useBrowserTTS = false;

renderCards();

function renderCards() {
  const area = document.getElementById('card-view');
  const filtered = wordData.filter(w => w.type === currentMode);
  let html = '';
  let lastSpell = null;

  const labelMap = {
    'y-ee':  { cls: 'label-y-ee',  text: '🟢 多音節字尾 Y → /iː/（同 "ee"）' },
    'y-ai':  { cls: 'label-y-ai',  text: '🔵 單音節字尾 Y → /aɪ/（同 "I"）' },
    'al':    { cls: 'label-al',     text: '🟣 -ALL / -ALK → a 唸 /ɔː/，-lk 中 l 不發音' },
    'work':  { cls: 'label-work',   text: '🟠 work：w + or → /ɜːr/，特殊例外' },
    'snail': { cls: 'label-snail',  text: '🩷 snail：ai → /eɪ/（vowel digraph）' },
  };

  filtered.forEach((w, idx) => {
    if (w.spell !== lastSpell) {
      lastSpell = w.spell;
      const lbl = labelMap[w.spell];
      html += `<div class="sound-section-label ${lbl.cls}">${lbl.text}</div>`;
    }
    const globalIdx = wordData.indexOf(w);
    html += `
      <div class="word-card card-${w.spell}" id="card-${globalIdx}" onclick="speak('${w.en}', ${globalIdx})">
        <span class="badge badge-${w.spell}">${w.sound}</span>
        <span class="word-emoji">${w.emoji}</span>
        <div class="word-en">${w.en}</div>
        <div class="word-zh">${w.zh}</div>
        <button class="btn-audio" id="btn-${globalIdx}">🔊</button>
      </div>`;
  });

  area.innerHTML = html;
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-${mode}`).classList.add('active');
  renderCards();
}

function toggleEngine() {
  useBrowserTTS = !useBrowserTTS;
  const btn = document.getElementById('engine-toggle');
  if (useBrowserTTS) {
    btn.className = 'engine-toggle-btn mode-browser';
    btn.innerHTML = '💻 發音模式: speak_browser (瀏覽器 API)';
  } else {
    btn.className = 'engine-toggle-btn';
    btn.innerHTML = '🌐 發音模式: speak (字典 API)';
  }
}

function speak(word, id) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if ('speechSynthesis' in window && window.speechSynthesis.speaking) window.speechSynthesis.cancel();

  const card = document.getElementById('card-' + id);
  const btn  = document.getElementById('btn-' + id);
  if (!card) return;

  document.querySelectorAll('.word-card').forEach(c => c.classList.remove('playing'));
  card.classList.add('playing');

  if (useBrowserTTS) { fallbackTTS(word, card); return; }

  if (btn) btn.innerHTML = '<span class="spinner"></span>';
  fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`)
    .then(r => r.json())
    .then(data => {
      let audioUrl = null;
      if (Array.isArray(data)) {
        for (const entry of data) {
          for (const ph of (entry.phonetics || [])) {
            if (ph.audio) { audioUrl = ph.audio; break; }
          }
          if (audioUrl) break;
        }
      }
      if (btn) btn.textContent = '🔊';
      if (audioUrl) {
        if (audioUrl.startsWith('//')) audioUrl = 'https:' + audioUrl;
        currentAudio = new Audio(audioUrl);
        currentAudio.play();
        currentAudio.onended = () => card.classList.remove('playing');
      } else {
        fallbackTTS(word, card);
      }
    })
    .catch(() => { if (btn) btn.textContent = '🔊'; fallbackTTS(word, card); });
}

function fallbackTTS(word, card) {
  if ('speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US'; utter.rate = 0.9;
    utter.onend = () => { if (card) card.classList.remove('playing'); };
    window.speechSynthesis.speak(utter);
  } else if (card) {
    card.classList.remove('playing');
  }
}
</script>
</body>
</html>
